---
- hosts: all
  become: true
  tasks:
    - name: Install apache httpd
      ansible.builtin.dnf:
        name: httpd
        state: present
        update_cache: yes
    - name: Start and enable httpd
      service:
        name: httpd
        state: started
        enabled: yes
    - name: Copy file with owner and permissions
      ansible.builtin.copy:
        src: index.html
        dest: /var/www/html
        owner: root
        group: root
        mode: '0644'